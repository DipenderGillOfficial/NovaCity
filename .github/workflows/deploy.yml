# Workflow to automatically build and deploy NovaCity to GitHub Pages
name: Build and Deploy to GitHub Pages

on:
  # Trigger the workflow on pushes to main or master branches
  push:
    branches: ["main", "master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment to prevent conflicts
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite Application
        run: npm run build:client
        env:
          # Keep client-side builds static
          NODE_ENV: production

      - name: Configure GitHub Pages Settings
        uses: actions/configure-pages@v4

      - name: Upload Built Dist Assets
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite compiles static HTML, CSS, and JS to the 'dist' directory
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
